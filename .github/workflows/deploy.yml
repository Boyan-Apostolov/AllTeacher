name: Deploy Backend

on:
  push:
    branches:
      - main
#
jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (FROM BACKEND)
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/allteacher-backend ././AllTeacher/backend

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/allteacher-backend

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/allteacher-backend
            docker compose -f ~/flask-app/docker-compose.yml down
            docker compose -f ~/flask-app/docker-compose.yml up -d
